name: Echo-auto-deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0  * * *"  # TW 08:30
    - cron: "30 1  * * *"  # TW 09:30
    - cron: "30 2  * * *"  # TW 10:30
    - cron: "30 3  * * *"  # TW 11:30
    - cron: "30 4  * * *"  # TW 12:30
    - cron: "30 5  * * *"  # TW 13:30
    - cron: "30 6  * * *"  # TW 14:30
    - cron: "30 7  * * *"  # TW 15:30
    - cron: "30 8  * * *"  # TW 16:30
    - cron: "30 9  * * *"  # TW 17:30
    - cron: "30 10 * * *"  # TW 18:30
    - cron: "30 11 * * *"  # TW 19:30
    - cron: "30 12 * * *"  # TW 20:30
    - cron: "30 13 * * *"  # TW 21:30
    - cron: "30 14 * * *"  # TW 22:30
    - cron: "30 15 * * *"  # TW 23:30

permissions:
  contents: write

concurrency:
  group: echo-auto-deploy
  cancel-in-progress: false

jobs:
  autogreen:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Decide & jitter
        id: decide
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual dispatch — running"
            echo "go=true" >> "$GITHUB_OUTPUT"
          elif [ $((RANDOM % 100)) -lt 56 ]; then
            jitter=$((RANDOM % 3300))
            echo "🎲 Roll: run after ${jitter}s jitter"
            sleep "$jitter"
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "🎲 Roll: skip this slot"
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.decide.outputs.go == 'true'
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - if: steps.decide.outputs.go == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - if: steps.decide.outputs.go == 'true'
        name: Update theme & pick commit message
        id: gen
        run: |
          set -x
          msg=$(node script/update-theme.js)
          if [ -z "$msg" ]; then
            msg="chore: refresh theme"
          fi
          echo "msg=$msg" >> "$GITHUB_OUTPUT"

      - if: steps.decide.outputs.go == 'true'
        name: Commit & push
        env:
          COMMIT_MSG: ${{ steps.gen.outputs.msg }}
          PAT: ${{ secrets.MYSELF_PAT_TOKEN }}
        run: |
          set -x
          : "${COMMIT_MSG:=chore: refresh theme}"
          git config --local user.email "s0912758806p@gmail.com"
          git config --local user.name "Gorman"
          git remote set-url origin "https://x-access-token:${PAT}@github.com/${{ github.repository }}"
          git status
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit — falling back to empty commit."
            git commit --allow-empty -m "$COMMIT_MSG"
          else
            git commit -m "$COMMIT_MSG"
          fi
          git pull --rebase origin main
          git push origin HEAD:main
